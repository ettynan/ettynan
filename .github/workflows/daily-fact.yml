name: Daily Fact Update

on:
  schedule:
    - cron: '0 12 * * *'  # Runs every day at noon UTC
  workflow_dispatch:       # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Fetch a random fact
        id: fact
        run: |
          FETCHED_FACT=$(curl -s https://uselessfacts.jsph.pl/api/v2/facts/random?language=en | python3 -c "import sys, json; print(json.load(sys.stdin)['text'])")
          {
          echo 'fact<<EOF'
          echo "$FETCHED_FACT"
          echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update README with fact
        run: |
          FACT="${{ steps.fact.outputs.fact }}"
          DATE=$(date +"%B %d, %Y")

          export FACT
          export DATE

          python3 scripts/update_fact.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'ettynan'
          git config --global user.email '${{ secrets.GIT_EMAIL }}'
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update daily fact"
          git pull --rebase
          git push
