name: Daily Fact Update

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch a random fact
        id: fact
        run: |
          FACT=$(curl -s "https://uselessfacts.jsph.pl/api/v2/facts/random?language=en" | python3 -c "import sys, json; print(json.load(sys.stdin)['text'])")

          {
            echo 'fact<<EOF'
            echo "$FACT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update README with fact
        env:
          FACT: ${{ steps.fact.outputs.fact }}
        run: |
          DATE=$(date +"%B %d, %Y")
          export DATE

          python3 <<'PY'
          import os
          import re

          fact = os.environ["FACT"]
          date = os.environ["DATE"]

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          new_section = (
              "<!-- DAILY_FACT_START -->\n"
              f"> 🧠 **Daily Fact ({date}):** {fact}\n"
              "<!-- DAILY_FACT_END -->"
          )

          updated = re.sub(
              r"<!-- DAILY_FACT_START -->.*?<!-- DAILY_FACT_END -->",
              new_section,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated)
          PY

      - name: Commit and push changes
        run: |
          git config --global user.name "ettynan"
          git config --global user.email "${{ secrets.GIT_EMAIL }}"

          git add README.md

          git diff --cached --quiet || git commit -m "chore: update daily fact"

          git push
